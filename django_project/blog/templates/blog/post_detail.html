{% extends "blog/base.html" %}
{% block content %}
        <article class="media glass-card mb-4 d-flex">
            <img class="rounded-circle account-img" src="{{ object.author.profile.image.url }}">
            <div class="media-body w-100">
                <div class="article-metadata d-flex justify-content-between align-items-center">
                    <a class="text-uppercase fw-bold" href="{% url 'user_posts' object.author.username %}" style="letter-spacing: 0.5px;">{{ object.author }}</a>
                    <small class="text-muted fw-medium">{{ object.date_posted | date:"F d, Y" }}</small>
                    {% if object.author == user %}
                        <div class="d-flex gap-2">
                            <a class="btn btn-secondary btn-sm mt-1 mb-1" href="{% url 'post_update' object.id %}">Update</a>
                            <a class="btn btn-danger btn-sm mt-1 mb-1" href="{% url 'post_delete' object.id %}">Delete</a>
                        </div>
                    {% endif %}
                </div>
                <h2 class="article-title fs-3">{{ object.title }}</h2>
                <p class="article-content fs-5 text-secondary">{{ object.content }}</p>
            </div>
        </article>
{% endblock content %}
