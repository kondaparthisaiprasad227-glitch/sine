{% extends "blog/base.html" %}
{% block content %}
    <div class="glass-card shadow-lg mx-auto" style="max-width: 5000px; border: 1px solid #ff416c; border-radius: 15px; padding: 20px; background-color: #fff; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);">
        <form method="POST" class="form">
            {% csrf_token %}
            <fieldset class="form-group mb-4">
                <legend class="border-bottom mb-4 pb-2 text-center" style="color: #ff416c; 
                font-weight: 700; font-size: 2rem;">Delete Post</legend>
                <h2>Are you sure you want to delete the post "{{ post.title }}"</h2>
            </fieldset>
            <div class="form-group text-center">
                <button class="btn btn-outline-danger" style="border: 1px solid red; 
                background-color: red; color: white; 
                font-size: 1.2rem; padding: 10px; padding-left: 20px;
                 padding-right: 20px; padding-top: 10px; 
                 padding-bottom: 10px; cursor: pointer; 
                 transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4); 
                 font-weight: 700; border-radius: 50px;" type="submit">Yes, Delete</button>
                 <a class="btn btn-secondary" href="{% url 'post_detail' post.id %}">Cancel</a>
            </div>
        </form>
    </div>
{% endblock content %}
