{% extends "blog/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
    <div class="content-section">
        <div class="media">
            {% if user.profile.image %}
                <img class="rounded-circle account-img" src="{{ user.profile.image.url }}" width="150">
            {% else %}
                <img class="rounded-circle account-img" src="/media/profile_pics/default.jpg" width="150">
            {% endif %}
            <div class="media-body">
                <h2 class="account-heading">{{ user.username }}</h2>
                <p class="text-secondary">{{ user.email }}</p>
            </div>
        </div>
        <form method="POST" class="form" enctype="multipart/form-data">
            {% csrf_token %}
            <fieldset class="form-group mb-4">
                <legend class="border-bottom mb-4 pb-2 text-center" style="color: #ff416c; font-weight: 700; font-size: 2rem;">Profile Information</legend>
                {{ u_form|crispy }}
                {{ p_form|crispy }}
            </fieldset>
            <div class="form-group text-center">
                <button class="btn btn-vibrant" type="submit" style="background-color:lightgreen;color:white;border:lightgreen; border-radius: 6px; padding: 5px 10px; margin: 10px; border-width: 2px; border-style: solid;font-size: 15px;">Update</button>
            </div>
        </form>
    </div>
{% endblock content %}
