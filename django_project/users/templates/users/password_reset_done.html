{% extends "blog/base.html" %}
{% block content %}
<div class="glass-card shadow-lg mx-auto" style="max-width: 500px; border: 1px solid #ff416c; border-radius: 15px; padding: 20px; background-color: #fff; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);">
    <h2 class="text-center mb-4" style="color: #ff416c; font-weight: 700;">Password Reset Sent</h2>
    <p class="text-center mb-4" style="color: #6c757d; font-size: 1.1rem;">
        We've sent an email to the address you provided. Please check your inbox and follow the instructions to reset your password.
    </p>
    <div class="text-center">
        <a href="{% url 'login' %}" class="btn btn-vibrant" style="background-color: #ff416c; color: #fff; border-radius: 15px; padding: 10px 20px; font-size: 1.1rem;">Back to Login</a>
    </div>
</div>
{% endblock content %}
